# We define a custom bridge network so our containers can resolve each other
networks:
  arlanda-net:
    driver: bridge

services:
  # Zookeeper
  # Kafka uses Zookeeper to manage cluster metadata and elect leaders.
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ops-hub-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - arlanda-net


  # Kafka Broker
  # The event bus that routes messages Python, Java, and Node.js services.
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ops-hub-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - arlanda-net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s


  # Schema Registry
  # The central repository for the Avro schemas which enforces data contracts between microservices.
  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    container_name: ops-hub-schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:29092
    networks:
      - arlanda-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  
  # Register all .avsc contracts with the Schema Registry before any
  # domain service tries to read/write against them. Runs once and exits;
  schema-registration:
    image: python:3.10-slim
    container_name: ops-hub-schema-registration
    depends_on:
      schema-registry:
        condition: service_healthy
    volumes:
      - ./scripts:/app/scripts:ro
      - ./schemas:/app/schemas:ro
    working_dir: /app
    environment:
      - SCHEMA_REGISTRY_URL=http://schema-registry:8081
    command: >
      sh -c "pip install --no-cache-dir confluent-kafka==2.3.0 --quiet && python scripts/register_schemas.py"
    networks:
      - arlanda-net

  # -----------------------------------------
  # DOMAIN MICROSERVICES
  # -----------------------------------------
  
  # Baggage Routing Service (Python)
  # Calculates optimal routes for luggage via the BHS and dispatches commands.
  baggage-routing-service:
    build: 
      context: ./services/baggage-routing
      dockerfile: Dockerfile
    container_name: baggage-routing
    environment:
      - KAFKA_BROKER=kafka:29092
      - SCHEMA_REGISTRY_URL=http://schema-registry:8081
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      schema-registration:
        condition: service_completed_successfully
    networks:
      - arlanda-net
    restart: unless-stopped