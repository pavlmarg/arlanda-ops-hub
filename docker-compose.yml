# We define a custom bridge network so our containers can resolve each other
networks:
  arlanda-net:
    driver: bridge

services:
  # Zookeeper
  # Kafka uses Zookeeper to manage cluster metadata and elect leaders.
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ops-hub-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - arlanda-net


  # Kafka Broker
  # The event bus that routes messages Python, Java, and Node.js services.
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ops-hub-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - arlanda-net


  # Schema Registry
  # The central repository for the Avro schemas which enforces data contracts between microservices.
  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    container_name: ops-hub-schema-registry
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:29092
    networks:
      - arlanda-net